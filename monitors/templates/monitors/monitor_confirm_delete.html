{% extends "base.html" %}

{% block title %}Delete Monitor — Uptime Monitor{% endblock %}

{% block content %}
<h1>Delete Monitor</h1>

<div class="form-card">
  <form method="post" aria-describedby="delete-description">
    {% csrf_token %}
    <div id="delete-description">
      <p>Are you sure you want to delete the monitor for:</p>
      <p style="margin-top:0.5rem; font-weight:600;">{{ monitor.url }}</p>
      <p style="margin-top:0.5rem; color:#666; font-size:0.875rem;">All check history for this monitor will be permanently removed.</p>
    </div>
    <div class="form-actions" style="margin-top:1.5rem;">
      <button type="submit" class="btn btn-danger">Yes, delete</button>
      <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
