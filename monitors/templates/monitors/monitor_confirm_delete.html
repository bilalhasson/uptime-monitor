{% extends "base.html" %}

{% block title %}Delete Monitor — Uptime Monitor{% endblock %}

{% block content %}
<h1>Delete Monitor</h1>

<p style="margin-top:1rem;">Are you sure you want to delete the monitor for:</p>
<p style="margin-top:0.5rem; font-weight:600;">{{ monitor.url }}</p>
<p style="margin-top:0.5rem; color:#666; font-size:0.875rem;">All check history for this monitor will be permanently removed.</p>

<div style="margin-top:1.5rem; display:flex; gap:0.75rem;">
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn" style="background:#dc2626; color:#fff;">Yes, delete</button>
  </form>
  <a href="/" class="btn" style="background:#e5e7eb; color:#1a1a1a;">Cancel</a>
</div>
{% endblock %}
