<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Uptime Monitor{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1a1a1a; background: #f5f5f5; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    .skip-nav { position: absolute; top: -100%; left: 1rem; padding: 0.5rem 1rem; background: #2563eb; color: #fff; border-radius: 4px; z-index: 100; text-decoration: none; font-weight: 500; }
    .skip-nav:focus { top: 0.5rem; }
    nav { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0.75rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    nav a { color: #1a1a1a; text-decoration: none; font-weight: 500; }
    nav a:hover { text-decoration: underline; }
    .nav-links { display: flex; gap: 1rem; align-items: center; }
    .container { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; }
    .btn { display: inline-block; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; text-decoration: none; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn:focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; }
    fieldset { border: none; padding: 0; margin: 0; min-width: 0; }
    legend { padding: 0; }
    .form-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.5rem; margin-top: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-weight: 600; margin-bottom: 0.25rem; font-size: 0.875rem; }
    .form-input { padding: 0.5rem; width: 100%; border: 1px solid #ccc; border-radius: 4px; font-size: 0.875rem; font-family: inherit; transition: border-color 0.15s, box-shadow 0.15s; outline: none; }
    .form-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.35); }
    .form-help { color: #666; font-size: 0.75rem; margin-top: 0.25rem; }
    .form-error { color: #dc2626; font-size: 0.8rem; margin-top: 0.25rem; }
    .form-error-banner { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.875rem; list-style: none; }
    .btn-secondary { background: #e5e7eb; color: #1a1a1a; }
    .btn-secondary:hover { background: #d1d5db; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .form-actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
    .alert-success { margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 4px; background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-nav">Skip to content</a>
  <nav aria-label="Main">
    <a href="/">Uptime Monitor</a>
    <div class="nav-links">
      {% if user.is_authenticated %}
        <span>{{ user.username }}</span>
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
          {% csrf_token %}
          <button type="submit" style="background:none;border:none;color:#1a1a1a;cursor:pointer;font:inherit;font-weight:500;padding:0;">Log out</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Log in</a>
        <a href="{% url 'signup' %}">Sign up</a>
      {% endif %}
    </div>
  </nav>
  <main id="main-content" class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
