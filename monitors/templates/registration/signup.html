{% extends "base.html" %}

{% block title %}Sign up — Uptime Monitor{% endblock %}

{% block content %}
<h1>Sign up</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Sign up</button>
</form>
<p style="margin-top:1rem;">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
{% endblock %}
