{% extends "base.html" %}

{% block title %}Log in — Uptime Monitor{% endblock %}

{% block content %}
<h1>Log in</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Log in</button>
</form>
<p style="margin-top:1rem;">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
{% endblock %}
